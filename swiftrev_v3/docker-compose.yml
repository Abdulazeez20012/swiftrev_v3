services:
  redis:
    image: redis:7-alpine
    container_name: swiftrev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: swiftrev-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev api

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: swiftrev-ai
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: swiftrev-web
    ports:
      - "5173:5173"
    depends_on:
      - api

  mobile:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    container_name: swiftrev-mobile
    ports:
      - "8081:8081"
    depends_on:
      - api

volumes:
  redis_data:
